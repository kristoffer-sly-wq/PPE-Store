<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PPE Store — Normand Maximus</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0f14;
  --surface:  #141920;
  --surface2: #1c2330;
  --border:   #2a3444;
  --accent:   #f0a500;
  --danger:   #e03e3e;
  --ok:       #2eb87a;
  --warn:     #e07c3e;
  --text:     #dde4ef;
  --muted:    #7a8a9e;
  --mono:     'Share Tech Mono', monospace;
  --cond:     'Barlow Condensed', sans-serif;
  --body:     'Barlow', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; padding-bottom: 80px; }

/* HEADER */
.hdr {
  background: var(--surface);
  border-bottom: 3px solid var(--accent);
  padding: 10px 16px;
  position: sticky; top: 0; z-index: 90;
}
.hdr-main { display: flex; justify-content: space-between; align-items: center; }
.hdr-vessel { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
.hdr-shelf { font-family: var(--cond); font-size: 22px; font-weight: 900; line-height: 1; color: var(--text); }
.hdr-loc { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }
.hdr-btns { display: flex; gap: 8px; align-items: center; }
.hdr-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); width: 38px; height: 38px; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.hdr-btn:active { opacity: 0.7; }
.hdr-btn.admin-on { background: var(--accent); color: #000; border-color: var(--accent); }

/* ADMIN MODE BANNER */
.admin-banner {
  display: none;
  background: linear-gradient(90deg, #f0a50022, transparent);
  border-bottom: 1px solid #f0a50044;
  padding: 6px 16px;
  font-family: var(--mono); font-size: 9px;
  color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
  align-items: center; gap: 8px;
}
.admin-banner.show { display: flex; }
.admin-banner-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse-dot 1.2s ease infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* STATS */
.stats { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 7px 16px; display: flex; gap: 16px; overflow-x: auto; font-family: var(--mono); font-size: 10px; color: var(--muted); scrollbar-width: none; }
.stats::-webkit-scrollbar { display: none; }
.stat { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.dot { width: 5px; height: 5px; border-radius: 50%; }
.dot-ok { background: var(--ok); }
.dot-warn { background: var(--warn); }
.dot-crit { background: var(--danger); }

/* FILTER BAR */
.filter-bar { padding: 10px 16px 4px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 20px; font-family: var(--mono); font-size: 10px; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

/* SECTION LABEL */
.sec-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; padding: 14px 16px 8px; display: flex; align-items: center; gap: 10px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ITEM GRID */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
@media (min-width: 800px) { .grid { grid-template-columns: repeat(3, 1fr); padding: 0 20px; } }
@media (min-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }

.card {
  background: linear-gradient(145deg, #1a2029, #141920);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: all 0.2s ease;
  display: flex;
  animation: fadeUp .3s ease both;
}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.10s}
.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.20s}
.card:nth-child(5){animation-delay:.25s}.card:nth-child(6){animation-delay:.30s}
.card:nth-child(7){animation-delay:.35s}.card:nth-child(8){animation-delay:.40s}

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.card:active { transform: scale(0.96); }
.card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(240,165,0,0.1); }

/* Status bar on left edge */
.card-status-bar { width: 4px; flex-shrink: 0; background: var(--border); border-radius: 10px 0 0 10px; }
.card.is-ok   .card-status-bar { background: var(--ok); }
.card.is-warn .card-status-bar { background: var(--warn); }
.card.is-low  .card-status-bar { background: var(--danger); box-shadow: 0 0 10px rgba(224,62,62,0.4); }
.card.is-low  { box-shadow: 0 0 10px rgba(224,62,62,0.2); }
.card.is-out  .card-status-bar { background: var(--border); }
.card.is-out  { filter: grayscale(0.7); opacity: 0.6; }

.card-inner { flex: 1; overflow: hidden; }

.badge { position: absolute; top: 8px; right: 8px; z-index: 2; font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: .5px; }
.badge-ok   { background: #2eb87a18; color: var(--ok);    border: 1px solid #2eb87a33; }
.badge-warn { background: #e07c3e18; color: var(--warn);  border: 1px solid #e07c3e33; }
.badge-crit { background: #e03e3e18; color: var(--danger); border: 1px solid #e03e3e33; }

/* CARD IMAGE AREA */
.card-img { width: 100%; height: 120px; background: #ffffff; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 8px 0 0; border-radius: 6px; position: relative; }
@media (min-width: 800px) { .card-img { height: 160px; } }
.card-img img { width: 100%; height: 100%; object-fit: contain; padding: 10px; transition: opacity 0.2s; }
.card-img .emoji-fb { font-size: 52px; }

/* ADMIN CAMERA BUTTON — sits on top-left of the image */
.cam-btn {
  display: none;
  position: absolute;
  bottom: 6px; left: 6px;
  z-index: 10;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(240,165,0,0.5);
  color: var(--accent);
  width: 32px; height: 32px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  transition: background 0.15s, transform 0.1s;
}
.cam-btn:active { transform: scale(0.9); }
.cam-btn:hover { background: rgba(240,165,0,0.2); }
body.admin-mode .cam-btn { display: flex; }

/* UPLOAD OVERLAY — shown on the card during upload */
.upload-overlay {
  display: none;
  position: absolute; inset: 0;
  background: rgba(11,15,20,0.82);
  border-radius: 6px;
  z-index: 20;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  backdrop-filter: blur(2px);
}
.upload-overlay.show { display: flex; }
.upload-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.upload-txt { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 1px; }

.card-body { padding: 10px 12px 12px; }
.card-brand { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--accent); margin-bottom: 2px; text-transform: uppercase; }
.card-name { font-family: var(--cond); font-size: 15px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
@media (min-width: 800px) { .card-name { font-size: 18px; } }
.card-stock { font-family: var(--mono); font-size: 10px; color: var(--muted); }

/* OVERLAY */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 150; backdrop-filter: blur(3px); }
.overlay.open { display: block; }

/* ISSUE PANEL */
.panel {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 3px solid var(--accent);
  border-radius: 16px 16px 0 0;
  padding: 18px 18px 36px;
  z-index: 200;
  max-height: 88vh; overflow-y: auto;
}
.panel.open { display: block; animation: slideUp .22s cubic-bezier(.4,0,.2,1); }
@media (min-width: 800px) { .panel { left: 50%; right: auto; transform: translateX(-50%); width: 580px; padding: 24px 32px 44px; border-radius: 16px 16px 0 0; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@media (min-width: 800px) { .panel.open { animation: slideUpCenter .22s cubic-bezier(.4,0,.2,1); } }
@keyframes slideUpCenter { from { transform: translateX(-50%) translateY(100%); } to { transform: translateX(-50%) translateY(0); } }

.panel-top { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
.panel-thumb { width: 72px; height: 72px; border-radius: 8px; background: #fff; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; cursor: default; }
.panel-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.panel-thumb .emoji-fb { font-size: 36px; }

/* Admin: clicking the panel thumb triggers photo upload */
.panel-thumb-cam {
  display: none;
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  align-items: center; justify-content: center;
  font-size: 22px;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.15s;
}
body.admin-mode .panel-thumb { cursor: pointer; }
body.admin-mode .panel-thumb:hover .panel-thumb-cam { display: flex; }
body.admin-mode .panel-thumb-cam { display: flex; opacity: 0; }
body.admin-mode .panel-thumb:hover .panel-thumb-cam { opacity: 1; }

.panel-meta { flex: 1; }
.panel-brand { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
.panel-name { font-family: var(--cond); font-size: 20px; font-weight: 800; line-height: 1.2; }
.panel-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 7px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* Admin photo-change button inside panel (below thumb) */
.panel-cam-btn {
  display: none;
  background: var(--surface2);
  border: 1px dashed var(--accent);
  color: var(--accent);
  width: 100%;
  padding: 9px 0;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  text-align: center;
  margin-bottom: 16px;
  transition: background 0.15s;
}
.panel-cam-btn:hover { background: #f0a50015; }
body.admin-mode .panel-cam-btn { display: block; }

.field-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

/* SIZE BUTTONS */
.size-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
.sz {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); min-width: 64px; height: 56px;
  border-radius: 8px; font-family: var(--mono); font-size: 15px;
  cursor: pointer; transition: all .1s;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  font-weight: 600; padding: 0 10px;
}
.sz:hover, .sz.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 800; }
.sz.oos { opacity: .3; cursor: not-allowed; text-decoration: line-through; }
.sz-count { font-size: 10px; color: var(--muted); display: block; text-align: center; margin-top: 2px; }
.sz.active .sz-count { color: #0007; }

/* QTY */
.qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.qty-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; min-width: 70px; }
.qty-ctrl { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.qbtn { background: var(--surface2); border: none; color: var(--accent); width: 58px; height: 58px; font-size: 28px; cursor: pointer; transition: background .1s; font-weight: 700; }
.qbtn:hover { background: var(--border); }
.qbtn:active { background: var(--accent); color: #000; }
.qval { width: 58px; text-align: center; font-family: var(--mono); font-size: 24px; background: var(--bg); color: var(--text); border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); height: 58px; line-height: 58px; pointer-events: none; }

/* NAME INPUT */
.name-inp { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 14px 14px; border-radius: 8px; font-family: var(--body); font-size: 15px; margin-bottom: 16px; }
.name-inp:focus { outline: none; border-color: var(--accent); }
.name-inp::placeholder { color: var(--muted); }

/* SUBMIT */
.submit { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 10px; font-family: var(--cond); font-size: 19px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: opacity .1s; position: relative; overflow: hidden; }
.submit:active { opacity: .75; }

/* SUCCESS CHECKMARK ANIMATION */
.submit-success { display: none; position: absolute; inset: 0; background: var(--ok); align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: #fff; }
.submit-success.show { display: flex; animation: popIn .3s ease; }
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* ISSUE LOG */
.log-toggle { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; cursor: pointer; user-select: none; }
.log-toggle-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
.log-toggle-lbl::after { content: ''; display: block; width: 60px; height: 1px; background: var(--border); }
.log-chevron { font-family: var(--mono); font-size: 11px; color: var(--muted); transition: transform 0.2s; }
.log-chevron.open { transform: rotate(180deg); }
.log-body { overflow: hidden; transition: max-height 0.3s ease; max-height: 0; }
.log-body.open { max-height: 1000px; }
.log-list { display: flex; flex-direction: column; gap: 6px; padding: 0 12px 16px; }
.log-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; display: flex; justify-content: space-between; align-items: center; }
.log-item { font-family: var(--cond); font-size: 14px; font-weight: 700; }
.log-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 2px; }
.log-qty { font-family: var(--mono); font-size: 15px; color: var(--danger); font-weight: 700; }
.empty-log { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; padding: 16px; border: 1px dashed var(--border); border-radius: 8px; margin: 0 12px 16px; }

/* TOAST */
.toast { position: fixed; top: 72px; left: 50%; transform: translateX(-50%) translateY(-16px); background: #000; color: var(--ok); border: 2px solid var(--ok); padding: 10px 24px; border-radius: 8px; font-family: var(--cond); font-size: 16px; font-weight: 900; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; white-space: nowrap; letter-spacing: 0.5px; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: #000; color: var(--danger); border-color: var(--danger); }
.toast.info { background: #000; color: var(--accent); border-color: var(--accent); }

/* LOADER */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* Hidden file input */
#photoInput { display: none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-main">
    <div>
      <div class="hdr-vessel">NORMAND MAXIMUS · PPE STORE</div>
      <div class="hdr-shelf" id="hdrShelf">—</div>
      <div class="hdr-loc" id="hdrLoc">—</div>
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="adminToggleBtn" onclick="toggleAdmin()" title="Toggle Admin Mode">🔒</button>
      <button class="hdr-btn" onclick="init()" title="Refresh">↻</button>
    </div>
  </div>
</div>

<!-- Admin mode banner -->
<div class="admin-banner" id="adminBanner">
  <div class="admin-banner-dot"></div>
  ADMIN MODE — Tap camera icon on any item to update its photo
</div>

<div class="stats" id="statsBar">
  <div class="stat"><div class="dot dot-ok"></div> Loading…</div>
</div>

<div class="filter-bar" id="filterBar" style="display:none">
  <button class="filter-btn active" onclick="filterItems('ALL', this)">All</button>
</div>

<div class="sec-label">Items on this shelf</div>
<div class="grid" id="itemGrid">
  <div class="loader" style="grid-column:1/-1">
    <div class="spinner"></div>
    <div class="loader-txt">Loading shelf data…</div>
  </div>
</div>

<div class="log-toggle" onclick="toggleLog()">
  <div class="log-toggle-lbl">Issue log — today <span id="logBadge" style="display:none;background:var(--danger);color:#fff;font-size:9px;padding:2px 7px;border-radius:10px;margin-left:6px;font-family:var(--mono);letter-spacing:0"></span></div>
  <div class="log-chevron" id="logChevron">▼</div>
</div>
<div class="log-body" id="logBody">
  <div class="empty-log" id="logWrap">No issues logged yet today</div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="issuePanel">
  <div class="panel-top">
    <div class="panel-thumb" id="pThumb" onclick="triggerPhotoUpload()">
      <img id="pThumbImg" src="" alt="" onerror="this.style.display='none';document.getElementById('pThumbEmoji').style.display='block'"/>
      <span class="emoji-fb" id="pThumbEmoji" style="display:none"></span>
      <div class="panel-thumb-cam">📷</div>
    </div>
    <div class="panel-meta">
      <div class="panel-brand" id="pBrand"></div>
      <div class="panel-name" id="pName"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>

  <!-- Admin photo change button -->
  <button class="panel-cam-btn" onclick="triggerPhotoUpload()">📷 &nbsp;Change Photo</button>

  <div class="field-lbl">Select size / variant</div>
  <div class="size-wrap" id="sizeWrap"></div>

  <div class="qty-row">
    <span class="qty-lbl">Quantity</span>
    <div class="qty-ctrl">
      <button class="qbtn" onclick="changeQty(-1)">−</button>
      <div class="qval" id="qval">1</div>
      <button class="qbtn" onclick="changeQty(1)">+</button>
    </div>
  </div>

  <div class="field-lbl">Your name</div>
  <input class="name-inp" id="nameInp" type="text" placeholder="Optional — helps track issues" autocomplete="off"/>

  <button class="submit" id="submitBtn" onclick="submitIssue()">
    ✓ &nbsp;Log Issue
    <div class="submit-success" id="successAnim">✓ Logged!</div>
  </button>
</div>

<!-- Hidden file input for photo upload -->
<input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelected(this)"/>

<div class="toast" id="toast"></div>

<!-- PIN MODAL -->
<div id="pinOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:2px solid var(--accent);border-radius:14px;padding:28px 28px;width:290px;text-align:center;">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--accent);margin-bottom:16px;">ADMIN ACCESS</div>
    <input id="pinInput" type="password" inputmode="text" placeholder="Enter PIN" autocomplete="off"
      style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:8px;font-family:var(--mono);font-size:18px;text-align:center;letter-spacing:4px;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')checkPin()"/>
    <div id="pinError" style="font-family:var(--mono);font-size:10px;color:var(--danger);min-height:16px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="closePinModal()" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:13px;border-radius:8px;font-family:var(--mono);font-size:11px;cursor:pointer;">Cancel</button>
      <button onclick="checkPin()" style="flex:1;background:var(--accent);border:none;color:#000;padding:13px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;">Unlock</button>
    </div>
  </div>
</div>

<script>
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWSqMvOGGM5XR75ciuMh_Stpi899u6awq1Nfl_ct2xagOTcVQ-eZ0nvZiX3GFNXrzJzA/exec";
var params = new URLSearchParams(window.location.search);
var SHELF_ID = params.get("id") || "DEMO";

var DEMO_SHELVES = {
  "305-L1-CABINET-AFT": {
    label: "305 L1 CABINET AFT", location: "Main Deck — Port Side Cabinet",
    items: [
      { id:"L1-01", brand:"TEGERA", name:"873 Gloves", emoji:"🧤", img:"", sizes:{"7":21,"8":16,"9":83,"10":130,"11":18}, min:20 },
      { id:"L1-02", brand:"RINGER", name:"R-Flex Cut 5 Gloves", emoji:"🧤", img:"", sizes:{"9/M":11,"10/L":21}, min:5 },
      { id:"L1-03", brand:"UVEX", name:"Safety Glasses Clear", emoji:"🥽", img:"", sizes:{"One size":61}, min:10 },
      { id:"L1-04", brand:"RW", name:"Safety Specs Amber", emoji:"🥽", img:"", sizes:{"One size":0}, min:10 }
    ]
  }
};

var shelfData = null;
var activeItem = null;
var activeSize = null;
var qty = 1;
var sessionLog = [];
var activeFilter = "ALL";
var logOpen = false;
var adminMode = false;

// ─── ADMIN MODE ─────────────────────────────────────────────────────────────

var ADMIN_PIN = "LAVR7";

function toggleAdmin() {
  if (adminMode) {
    // Already on — lock it
    adminMode = false;
    document.body.classList.remove("admin-mode");
    document.getElementById("adminBanner").classList.remove("show");
    var btn = document.getElementById("adminToggleBtn");
    btn.textContent = "🔒";
    btn.classList.remove("admin-on");
    toast("Admin mode OFF", false, true);
  } else {
    // Show PIN modal
    document.getElementById("pinOverlay").style.display = "flex";
    document.getElementById("pinInput").value = "";
    document.getElementById("pinError").textContent = "";
    setTimeout(function(){ document.getElementById("pinInput").focus(); }, 100);
  }
}

function checkPin() {
  var entered = document.getElementById("pinInput").value.trim();
  if (entered === ADMIN_PIN) {
    adminMode = true;
    document.body.classList.add("admin-mode");
    document.getElementById("adminBanner").classList.add("show");
    var btn = document.getElementById("adminToggleBtn");
    btn.textContent = "🔓";
    btn.classList.add("admin-on");
    closePinModal();
    toast("Admin mode ON", false, true);
  } else {
    document.getElementById("pinError").textContent = "Incorrect PIN";
    document.getElementById("pinInput").value = "";
    document.getElementById("pinInput").focus();
  }
}

function closePinModal() {
  document.getElementById("pinOverlay").style.display = "none";
}

// ─── INIT & DATA ─────────────────────────────────────────────────────────────

function init() {
  var isDemo = (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE");
  if (isDemo) {
    shelfData = DEMO_SHELVES[SHELF_ID] || DEMO_SHELVES["305-L1-CABINET-AFT"];
    render(); return;
  }
  var cbName = "ppe_" + Date.now();
  var script = document.createElement("script");
  var timer = setTimeout(function() {
    document.getElementById("itemGrid").innerHTML = '<div class="loader" style="grid-column:1/-1"><div style="font-family:var(--mono);font-size:11px;color:var(--danger);text-align:center;padding:30px">Could not load shelf data.</div></div>';
    script.remove();
  }, 10000);
  window[cbName] = function(data) {
    clearTimeout(timer); script.remove(); delete window[cbName];
    if (data.error) {
      var msg = data.error.indexOf('googleapis.com') !== -1 || data.error.indexOf('Authorization') !== -1
        ? 'Apps Script needs re-authorization. Open Apps Script → Run any function → Grant permissions, then redeploy.'
        : data.error;
      document.getElementById("itemGrid").innerHTML = '<div class="loader" style="grid-column:1/-1"><div style="color:var(--danger);font-family:var(--mono);font-size:11px;text-align:center;padding:30px;line-height:1.8">' + msg + '</div></div>';
      return;
    }
    shelfData = data; render();
  };
  script.src = APPS_SCRIPT_URL + "?action=getShelf&id=" + encodeURIComponent(SHELF_ID) + "&callback=" + cbName;
  document.head.appendChild(script);
}

function totalStock(item) { return Object.values(item.sizes).reduce(function(a,b){return a+b;},0); }
function stockLevel(item) {
  var t = totalStock(item);
  if (t === 0) return "out";
  if (t <= item.min) return "crit";
  if (t <= item.min * 2) return "warn";
  return "ok";
}

function render() {
  document.getElementById("hdrShelf").textContent = shelfData.label;
  document.getElementById("hdrLoc").textContent = shelfData.location;
  buildFilters();
  renderStats();
  renderGrid();
  renderLog();
}

function buildFilters() {
  var cats = {};
  shelfData.items.forEach(function(item) { var c = item.name.split(" ")[0]; cats[c] = true; });
  var keys = Object.keys(cats);
  if (keys.length <= 1) return;
  var bar = document.getElementById("filterBar");
  bar.style.display = "flex";
  bar.innerHTML = '<button class="filter-btn active" onclick="filterItems(\'ALL\', this)">All</button>';
  keys.forEach(function(k) {
    bar.innerHTML += '<button class="filter-btn" onclick="filterItems(\'' + k + '\', this)">' + k + '</button>';
  });
}

function filterItems(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  renderGrid();
}

function renderStats() {
  var items = shelfData.items;
  var out = items.filter(function(i){return stockLevel(i)==="out";}).length;
  var crit = items.filter(function(i){return stockLevel(i)==="crit";}).length;
  var warn = items.filter(function(i){return stockLevel(i)==="warn";}).length;
  document.getElementById("statsBar").innerHTML =
    '<div class="stat"><div class="dot dot-ok"></div> ' + items.length + ' item types</div>' +
    (crit ? '<div class="stat"><div class="dot dot-crit"></div> ' + crit + ' low stock</div>' : '') +
    (out ? '<div class="stat"><div class="dot dot-crit"></div> ' + out + ' out of stock</div>' : '') +
    (warn ? '<div class="stat"><div class="dot dot-warn"></div> ' + warn + ' running low</div>' : '') +
    '<div class="stat"><div class="dot dot-ok"></div> ' + sessionLog.length + ' issued today</div>';
  var badge = document.getElementById("logBadge");
  if (sessionLog.length > 0) { badge.style.display = "inline"; badge.textContent = sessionLog.length + " issued"; }
  else { badge.style.display = "none"; }
}

function renderGrid() {
  var items = shelfData.items.filter(function(item) {
    if (activeFilter === "ALL") return true;
    return item.name.split(" ")[0] === activeFilter;
  });

  document.getElementById("itemGrid").innerHTML = items.map(function(item) {
    var lvl = stockLevel(item);
    var total = totalStock(item);
    var cardCls = lvl === "out" ? "is-out" : lvl === "crit" ? "is-low" : lvl === "warn" ? "is-warn" : "is-ok";
    var badgeTxt = total === 0 ? "OUT" : lvl === "crit" ? "LOW — " + total + " left" : lvl === "warn" ? total + " left" : total + " in stock";
    var badgeCls = (lvl === "out" || lvl === "crit") ? "badge-crit" : lvl === "warn" ? "badge-warn" : "badge-ok";
    var imgHtml = item.img
      ? '<img id="cardimg-' + item.id + '" src="' + item.img + '" alt="' + item.name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><span class="emoji-fb" id="cardemoji-' + item.id + '" style="display:none">' + item.emoji + '</span>'
      : '<span class="emoji-fb" id="cardemoji-' + item.id + '">' + item.emoji + '</span>';
    return '<div class="card ' + cardCls + '" id="card-' + item.id + '" onclick="openPanel(\'' + item.id + '\')">' +
      '<div class="card-status-bar"></div>' +
      '<div class="card-inner">' +
      '<span class="badge ' + badgeCls + '">' + badgeTxt + '</span>' +
      '<div class="card-img" id="cardimgwrap-' + item.id + '">' +
        imgHtml +
        '<button class="cam-btn" onclick="event.stopPropagation();triggerCardPhotoUpload(\'' + item.id + '\')" title="Update photo">📷</button>' +
        '<div class="upload-overlay" id="overlay-' + item.id + '"><div class="upload-spinner"></div><div class="upload-txt">Uploading…</div></div>' +
      '</div>' +
      '<div class="card-body">' +
      '<div class="card-brand">' + item.brand + '</div>' +
      '<div class="card-name">' + item.name + '</div>' +
      '<div class="card-stock">' + total + ' in stock</div>' +
      '</div></div></div>';
  }).join("");
}

// ─── PANEL ───────────────────────────────────────────────────────────────────

function openPanel(itemId) {
  activeItem = shelfData.items.find(function(i){return i.id===itemId;});
  activeSize = null; qty = 1;
  var tImg = document.getElementById("pThumbImg");
  var tEmoji = document.getElementById("pThumbEmoji");
  if (activeItem.img) { tImg.src = activeItem.img; tImg.style.display="block"; tEmoji.style.display="none"; }
  else { tImg.style.display="none"; tEmoji.textContent=activeItem.emoji; tEmoji.style.display="block"; }
  document.getElementById("pBrand").textContent = activeItem.brand;
  document.getElementById("pName").textContent = activeItem.name;
  document.getElementById("qval").textContent = 1;
  document.getElementById("nameInp").value = "";
  document.getElementById("successAnim").classList.remove("show");

  var entries = Object.entries(activeItem.sizes);
  document.getElementById("sizeWrap").innerHTML = entries.map(function(entry) {
    var sz = entry[0]; var cnt = entry[1]; var oos = cnt === 0;
    return '<button class="sz' + (oos?" oos":"") + '"' + (oos?' disabled':'') + ' onclick="' + (oos?"":"selectSize(this,'"+sz+"')") + '">' +
      sz + '<span class="sz-count">' + (cnt===0?"out":cnt+" left") + '</span></button>';
  }).join("");

  var available = entries.filter(function(e){return e[1]>0;});
  if (available.length === 1) {
    activeSize = available[0][0];
    var btn = document.querySelector(".sz:not(.oos)");
    if (btn) btn.classList.add("active");
  }

  document.getElementById("issuePanel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePanel() {
  document.getElementById("issuePanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
  activeItem = null; activeSize = null; qty = 1;
}

function selectSize(btn, sz) {
  document.querySelectorAll(".sz").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active"); activeSize = sz;
  qty = 1; document.getElementById("qval").textContent = 1;
}

function changeQty(d) {
  var max = (activeItem && activeSize) ? (activeItem.sizes[activeSize] || 1) : 20;
  qty = Math.max(1, Math.min(qty + d, max));
  document.getElementById("qval").textContent = qty;
  if (navigator.vibrate) navigator.vibrate(20);
}

function submitIssue() {
  if (!activeSize) { toast("Select a size first", true); return; }
  var avail = activeItem.sizes[activeSize];
  if (avail < qty) { toast("Only " + avail + " available in size " + activeSize, true); return; }

  var name = document.getElementById("nameInp").value.trim() || "—";
  var now = new Date();
  var timeStr = now.toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit"});

  activeItem.sizes[activeSize] -= qty;

  var entry = { shelf: SHELF_ID, itemId: activeItem.id, itemName: activeItem.brand + " " + activeItem.name, size: activeSize, qty: qty, name: name, time: timeStr, date: now.toISOString().slice(0,10) };
  sessionLog.unshift(entry);

  if (APPS_SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL_HERE") {
    fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(Object.assign({action:"logIssue"}, entry)) }).catch(function(){});
  }

  var submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.style.opacity = "0.6";
  submitBtn.textContent = "Saving...";

  var anim = document.getElementById("successAnim");
  anim.classList.add("show");
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

  setTimeout(function() {
    submitBtn.disabled = false;
    submitBtn.style.opacity = "";
    submitBtn.innerHTML = "✓ &nbsp;Log Issue<div class=\"submit-success\" id=\"successAnim\">✓ Logged!</div>";
    closePanel();
    renderGrid();
    renderStats();
    renderLog();
    if (!logOpen) { toggleLog(); }
    toast(qty + "x " + activeItem.brand + " " + activeItem.name + " — Size " + activeSize);
  }, 700);
}

// ─── LOG ─────────────────────────────────────────────────────────────────────

function renderLog() {
  var w = document.getElementById("logWrap");
  if (!sessionLog.length) { w.outerHTML = '<div class="empty-log" id="logWrap">No issues logged yet today</div>'; return; }
  var html = '<div class="log-list" id="logWrap">' + sessionLog.map(function(e) {
    return '<div class="log-row"><div><div class="log-item">' + e.itemName + '</div><div class="log-sub">Size ' + e.size + ' · ' + e.name + ' · ' + e.time + '</div></div><div class="log-qty">−' + e.qty + '</div></div>';
  }).join("") + '</div>';
  var old = document.getElementById("logWrap");
  var tmp = document.createElement("div"); tmp.innerHTML = html;
  old.parentNode.replaceChild(tmp.firstChild, old);
}

function toggleLog() {
  logOpen = !logOpen;
  var body = document.getElementById("logBody");
  var chevron = document.getElementById("logChevron");
  if (logOpen) { body.classList.add("open"); chevron.classList.add("open"); }
  else { body.classList.remove("open"); chevron.classList.remove("open"); }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

function toast(msg, err, info) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (err ? " err" : info ? " info" : "");
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2800);
}

// ─── ADMIN PHOTO UPLOAD ──────────────────────────────────────────────────────

var uploadTargetItemId = null;  // which item we're uploading for

/**
 * Called from the camera button on a card (in grid, not panel).
 * Stores the target item id and opens the file picker.
 */
function triggerCardPhotoUpload(itemId) {
  uploadTargetItemId = itemId;
  var inp = document.getElementById("photoInput");
  inp.value = ""; // reset so same file can be re-selected
  inp.click();
}

/**
 * Called from the "Change Photo" button inside the issue panel.
 * Uses the currently active item.
 */
function triggerPhotoUpload() {
  if (!activeItem) return;
  uploadTargetItemId = activeItem.id;
  var inp = document.getElementById("photoInput");
  inp.value = "";
  inp.click();
}

/**
 * Called when the user picks a file.
 * Uses a Canvas to "flatten" EXIF rotation (iPhone orientation fix),
 * then sends to Apps Script as base64 JPEG.
 */
function handlePhotoSelected(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var itemId = uploadTargetItemId;
  if (!itemId) return;

  // Show upload overlay on the card
  setCardUploadState(itemId, true);

  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    var img = new Image();
    img.onload = function() {
      // ── ORIENTATION FIX via Canvas ──
      // Drawing to canvas physically bakes in the correct orientation,
      // discarding any EXIF orientation flags. This prevents the
      // "upside-down iPhone photo" problem.
      var MAX_SIZE = 1200; // max dimension px — keeps upload fast
      var w = img.naturalWidth;
      var h = img.naturalHeight;
      var scale = Math.min(1, MAX_SIZE / Math.max(w, h));
      var cw = Math.round(w * scale);
      var ch = Math.round(h * scale);

      var canvas = document.createElement("canvas");
      canvas.width = cw;
      canvas.height = ch;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, cw, ch);

      // Quality 0.82 JPEG — good balance of size vs clarity
      var base64 = canvas.toDataURL("image/jpeg", 0.82);

      sendPhotoToAppsScript(itemId, base64);
    };
    img.onerror = function() {
      setCardUploadState(itemId, false);
      toast("Could not read image", true);
    };
    img.src = dataUrl;
  };
  reader.onerror = function() {
    setCardUploadState(itemId, false);
    toast("Could not read file", true);
  };
  reader.readAsDataURL(file);
}

/**
 * POSTs the base64 image to Apps Script, then updates the UI on success.
 */
function sendPhotoToAppsScript(itemId, base64Data) {
  if (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    // Demo mode: just update the UI locally with the canvas data
    handleUploadSuccess(itemId, base64Data);
    return;
  }

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "uploadImage",
      itemId: itemId,
      base64Data: base64Data
    })
  })
  .then(function(res) {
    // Read as text first — if Apps Script returns an auth error page it won't be JSON
    return res.text().then(function(text) {
      // Check for OAuth/auth error in the response body
      if (text.indexOf('googleapis.com/auth') !== -1 || text.indexOf('ScriptError') !== -1) {
        throw new Error('auth');
      }
      try { return JSON.parse(text); }
      catch(e) { throw new Error('bad response'); }
    });
  })
  .then(function(data) {
    if (data.error) { throw new Error(data.error); }
    // Apps Script returns the Drive thumbnail URL
    handleUploadSuccess(itemId, data.url);
  })
  .catch(function(err) {
    setCardUploadState(itemId, false);
    var msg = err.message && (err.message.indexOf('googleapis') !== -1 || err.message.indexOf('auth') !== -1)
      ? 'Auth error — re-authorize Apps Script'
      : 'Upload failed — check Apps Script';
    toast(msg, true);
    console.error("Upload error:", err);
  });
}

/**
 * Called after a successful upload.
 * Updates the in-memory item data and refreshes both the card and the panel thumb.
 */
function handleUploadSuccess(itemId, newUrl) {
  // 1. Update in-memory shelf data
  var item = shelfData.items.find(function(i){ return i.id === itemId; });
  if (item) { item.img = newUrl; }

  // 2. Update the card image in the grid (without re-rendering the entire grid)
  var cardImg = document.getElementById("cardimg-" + itemId);
  var cardEmoji = document.getElementById("cardemoji-" + itemId);
  if (cardImg) {
    cardImg.src = newUrl;
    cardImg.style.display = "block";
    if (cardEmoji) { cardEmoji.style.display = "none"; }
  } else {
    // Card might have had only an emoji (no img element yet) — re-render the grid
    renderGrid();
  }

  // 3. Hide the upload overlay
  setCardUploadState(itemId, false);

  // 4. Update the panel thumbnail if the panel is open for this item
  if (activeItem && activeItem.id === itemId) {
    var pImg = document.getElementById("pThumbImg");
    var pEmoji = document.getElementById("pThumbEmoji");
    pImg.src = newUrl;
    pImg.style.display = "block";
    if (pEmoji) { pEmoji.style.display = "none"; }
  }

  // 5. Haptic feedback + toast
  if (navigator.vibrate) { navigator.vibrate([30, 20, 60]); }
  toast("✓ Photo Updated Successfully");
}

/**
 * Shows or hides the upload overlay on a specific card's image area.
 */
function setCardUploadState(itemId, uploading) {
  var overlay = document.getElementById("overlay-" + itemId);
  if (overlay) {
    overlay.classList.toggle("show", uploading);
  }
}

init();
</script>
