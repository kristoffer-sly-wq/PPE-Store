<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPE Store — Normand Maximus</title>
<!-- Theme must be set BEFORE paint to avoid flash of wrong theme -->
<script>
(function() {
  try {
    var saved = localStorage.getItem("ppe_theme");
    var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "day" : "night");
    document.documentElement.setAttribute("data-theme", theme);
  } catch(e) {
    document.documentElement.setAttribute("data-theme", "night");
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0f14;
  --surface:   #141920;
  --surface2:  #1c2330;
  --border:    #2a3444;
  --accent:    #f0a500;
  --danger:    #e03e3e;
  --ok:        #2eb87a;
  --warn:      #e07c3e;
  --text:      #dde4ef;
  --muted:     #7a8a9e;
  --header-bg: #141920;
  --header-text: #dde4ef;
  --card-shadow: none;
  --mono:      'Share Tech Mono', monospace;
  --cond:      'Barlow Condensed', sans-serif;
  --body:      'Barlow', sans-serif;
}

/* ═══ DAY MODE ═══ */
[data-theme="day"] {
  --bg:        #f3f5f8;
  --surface:   #ffffff;
  --surface2:  #eaeef3;
  --border:    #d5dce4;
  --accent:    #f0a500;
  --danger:    #c9302c;
  --ok:        #1d8a5a;
  --warn:      #b85c1f;
  --text:      #1a2332;
  --muted:     #6b7a8e;
  --header-bg: #1a3052;
  --header-text: #ffffff;
  --card-shadow: 0 1px 2px rgba(26,48,82,0.06), 0 2px 8px rgba(26,48,82,0.04);
}
[data-theme="day"] .shelf-card { box-shadow: var(--card-shadow); }
[data-theme="day"] .shelf-card:hover { box-shadow: 0 2px 6px rgba(26,48,82,0.08), 0 6px 16px rgba(26,48,82,0.08); }
[data-theme="day"] .vessel { color: rgba(255,255,255,0.8); }
[data-theme="day"] .date-lbl { color: rgba(255,255,255,0.65); }
[data-theme="day"] .date-val { color: #fff; }
[data-theme="day"] .title { color: #fff; }
[data-theme="day"] .cart-drawer { background: var(--bg); }
[data-theme="day"] .cart-row { background: var(--surface); }
[data-theme="day"] #pinOverlay > div { background: var(--surface) !important; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: var(--header-bg);
  border-bottom: 3px solid var(--accent);
  padding: 16px 24px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}
.hdr-l { display: flex; flex-direction: column; gap: 3px; }
.vessel {
  font-family: var(--mono); font-size: 10px;
  color: var(--accent); letter-spacing: 2.5px; text-transform: uppercase;
}
.title {
  font-family: var(--cond); font-size: 28px; font-weight: 900;
  letter-spacing: 0.5px; line-height: 1; color: var(--header-text);
}
.hdr-r {
  text-align: right;
  display: flex; align-items: center; gap: 14px;
}
.date-lbl {
  font-family: var(--mono); font-size: 9px;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
}
.date-val {
  font-family: var(--mono); font-size: 13px;
  color: var(--header-text); margin-top: 2px;
}

/* Theme toggle in header */
.theme-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  color: var(--accent); width: 40px; height: 40px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.theme-btn:hover { background: rgba(255,255,255,0.18); }
.theme-btn:active { opacity: 0.75; }
.theme-btn .theme-icon { display: none; }
[data-theme="night"] .theme-btn .theme-icon-sun { display: block; }
[data-theme="day"]   .theme-btn .theme-icon-moon { display: block; }
[data-theme="day"] .theme-btn { color: #fff; }

/* ── FLOATING CART BUTTON (bottom-right) ── */
.cart-fab {
  display: none;
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--accent); color: #000;
  border: none;
  border-radius: 14px;
  padding: 14px 20px;
  font-family: var(--cond); font-size: 16px; font-weight: 900;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer;
  align-items: center; gap: 10px;
  box-shadow: 0 6px 24px rgba(240,165,0,0.45), 0 2px 8px rgba(0,0,0,0.5);
  z-index: 300;
  transition: transform 0.15s, box-shadow 0.15s;
  animation: fabIn .3s cubic-bezier(.34,1.56,.64,1);
}
.cart-fab.show { display: inline-flex; }
.cart-fab:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(240,165,0,0.55), 0 2px 8px rgba(0,0,0,0.5); }
.cart-fab:active { transform: scale(0.95); }
.cart-fab-icon { font-size: 22px; }
.cart-fab-count {
  background: #000; color: var(--accent);
  border-radius: 12px;
  padding: 2px 9px;
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  min-width: 24px; text-align: center;
}
@keyframes fabIn { from { opacity:0; transform: translateY(16px) scale(.8); } to { opacity:1; transform: translateY(0) scale(1); } }
@keyframes bump  { 0%,100% { transform: scale(1);} 50% { transform: scale(1.15);} }
.cart-fab.bump { animation: bump .35s ease; }

/* ── SUMMARY BAR ── */
.summary {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; gap: 24px; overflow-x: auto;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  scrollbar-width: none;
}
.summary::-webkit-scrollbar { display: none; }
.sstat { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-ok   { background: var(--ok); }
.dot-warn { background: var(--warn); }
.dot-crit { background: var(--danger); }

/* ── SECTION ── */
.sec-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
  color: var(--accent); text-transform: uppercase;
  padding: 20px 24px 10px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── SHELF GRID ── */
.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  padding: 0 24px 40px;
}

.shelf-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex; flex-direction: column;
  transition: border-color .15s, transform .1s;
  animation: fadeUp .3s ease both;
}
.shelf-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.shelf-card:active { transform: scale(0.98); }
.shelf-card.has-crit { border-color: var(--danger); }
.shelf-card.has-warn { border-color: var(--warn); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-top {
  padding: 14px 16px 10px;
  display: flex; justify-content: space-between; align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.card-id {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  color: var(--muted); text-transform: uppercase; margin-bottom: 4px;
}
.card-name {
  font-family: var(--cond); font-size: 17px; font-weight: 800;
  line-height: 1.1;
}
.status-pill {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  padding: 3px 8px; border-radius: 5px; white-space: nowrap;
  margin-left: 8px; margin-top: 2px; flex-shrink: 0;
}
.pill-ok   { background: #2eb87a18; color: var(--ok);   border: 1px solid #2eb87a33; }
.pill-warn { background: #e07c3e18; color: var(--warn); border: 1px solid #e07c3e33; }
.pill-crit { background: #e03e3e18; color: var(--danger); border: 1px solid #e03e3e33; }
.pill-load { background: #7a8a9e18; color: var(--muted); border: 1px solid #7a8a9e33; }

.card-bottom {
  padding: 10px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.card-loc {
  font-family: var(--body); font-size: 12px; color: var(--muted);
}
.item-pills {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px;
}
.item-pill {
  font-family: var(--mono); font-size: 9px;
  padding: 2px 7px; border-radius: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted);
}
.item-pill.low { color: var(--danger); border-color: #e03e3e33; background: #e03e3e11; }
.item-pill.warn { color: var(--warn); border-color: #e07c3e33; background: #e07c3e11; }

.card-arrow {
  align-self: flex-end;
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  margin-top: 4px;
}

/* ── LOADING ── */
.loader-grid {
  padding: 0 24px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.skel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  height: 120px;
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; }
  50%       { opacity: .8; }
}

/* ── FOOTER ── */
.footer {
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  display: flex; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}

/* ── CART DRAWER (shared styles, see shelf.html for full; here it's simpler — just read-only list + submit/clear) ── */
.cart-overlay { display:none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 400; backdrop-filter: blur(3px); }
.cart-overlay.open { display: block; }
.cart-drawer {
  display:none;
  position: fixed; top:0; right:0; bottom:0;
  width: 100%; max-width: 440px;
  background: var(--surface);
  border-left: 3px solid var(--accent);
  z-index: 500;
  flex-direction: column;
}
.cart-drawer.open { display:flex; animation: slideL .22s ease; }
@keyframes slideL { from { transform: translateX(100%);} to { transform: translateX(0);} }
.cart-hdr {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.cart-hdr-ttl { font-family: var(--cond); font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.cart-hdr-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top:2px;}
.cart-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 36px; height:36px; border-radius: 8px; font-size: 15px; cursor: pointer;}
.cart-body { flex:1; overflow-y:auto; padding: 14px 16px; }
.cart-empty { text-align:center; padding: 50px 20px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
.cart-row {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex; gap: 10px; align-items: center;
}
.cart-row-info { flex:1; }
.cart-row-shelf { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 1px; margin-bottom: 3px; }
.cart-row-name { font-family: var(--cond); font-size: 15px; font-weight: 700; line-height: 1.15; margin-bottom: 3px; }
.cart-row-size { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.cart-row-qty { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent); margin-right: 8px; }
.cart-row-rm { background: transparent; border: 1px solid var(--danger); color: var(--danger); border-radius: 7px; padding: 6px 10px; font-family: var(--mono); font-size: 10px; cursor: pointer; }
.cart-row-rm:active { background: var(--danger); color: #fff; }

.cart-foot { padding: 16px 20px 24px; border-top: 1px solid var(--border); display:flex; flex-direction: column; gap: 10px; }
.cart-name-inp {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 12px; border-radius: 8px;
  font-family: var(--body); font-size: 14px;
}
.cart-name-inp:focus { outline:none; border-color: var(--accent); }
.cart-submit {
  width: 100%; background: var(--accent); color: #000; border: none;
  padding: 16px; border-radius: 10px;
  font-family: var(--cond); font-size: 17px; font-weight: 900;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
}
.cart-submit:disabled { opacity: .5; cursor: not-allowed; }
.cart-submit:active { opacity: .75; }
.cart-clear {
  width: 100%; background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 10px; border-radius: 8px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 1px; cursor: pointer;
}
.cart-clear:hover { border-color: var(--danger); color: var(--danger); }

/* TOAST (shared) */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-16px); background: #000; color: var(--ok); border: 2px solid var(--ok); padding: 10px 20px; border-radius: 8px; font-family: var(--cond); font-size: 15px; font-weight: 800; opacity: 0; transition: all .25s; pointer-events: none; z-index: 999; white-space: nowrap; letter-spacing: 0.5px; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { color: var(--danger); border-color: var(--danger); }
.toast.info { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <span class="vessel">Solstad Offshore · Normand Maximus</span>
    <span class="title">PPE Store — 0305</span>
  </div>
  <div class="hdr-r">
    <div>
      <div class="date-lbl">Today</div>
      <div class="date-val" id="dateVal">—</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle day/night mode" aria-label="Toggle day/night mode">
      <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="summary" id="summaryBar">
  <div class="sstat"><div class="dot dot-ok"></div> Loading shelves…</div>
</div>

<div class="sec-label">Main Deck — All Shelves</div>

<div id="gridWrap">
  <div class="loader-grid">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<div class="footer">
  <span>PPE Store Management · Normand Maximus</span>
  <div style="display:flex;align-items:center;gap:12px;">
    <button onclick="promptAdminPin()" id="adminFooterBtn" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:6px;font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:1px;">🔒 ADMIN</button>
    <span id="lastUpdated">—</span>
  </div>
</div>

<!-- PIN MODAL -->
<div id="pinOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:2px solid var(--accent);border-radius:14px;padding:28px 32px;width:300px;text-align:center;">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--accent);margin-bottom:16px;">ADMIN ACCESS</div>
    <input id="pinInput" type="password" inputmode="text" placeholder="Enter PIN" autocomplete="off"
      style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:8px;font-family:var(--mono);font-size:18px;text-align:center;letter-spacing:4px;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')checkPin()"/>
    <div id="pinError" style="font-family:var(--mono);font-size:10px;color:var(--danger);min-height:16px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:10px;">
      <button onclick="closePinModal()" style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:12px;border-radius:8px;font-family:var(--mono);font-size:11px;cursor:pointer;">Cancel</button>
      <button onclick="checkPin()" style="flex:1;background:var(--accent);border:none;color:#000;padding:12px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;">Unlock</button>
    </div>
  </div>
</div>

<!-- FLOATING CART BUTTON (bottom-right) -->
<button class="cart-fab" id="cartFab" onclick="openCart()">
  <span class="cart-fab-icon">🛒</span>
  <span>Cart</span>
  <span class="cart-fab-count" id="cartFabCount">0</span>
</button>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-hdr">
    <div>
      <div class="cart-hdr-ttl">🛒 Your Cart</div>
      <div class="cart-hdr-sub" id="cartSub">0 items</div>
    </div>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-foot" id="cartFoot" style="display:none;">
    <input class="cart-name-inp" id="cartNameInp" type="text" placeholder="Your name (optional)" autocomplete="off"/>
    <button class="cart-submit" id="cartSubmitBtn" onclick="submitCart()">✓ Submit All & Update Stock</button>
    <button class="cart-clear" onclick="clearCartConfirm()">Clear Cart</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DAY / NIGHT THEME ──────────────────────────────────────────────────────
// Initial theme is set in <head> before paint. This just handles the toggle.
function toggleTheme() {
  var cur = document.documentElement.getAttribute("data-theme") || "night";
  var next = cur === "night" ? "day" : "night";
  document.documentElement.setAttribute("data-theme", next);
  try { localStorage.setItem("ppe_theme", next); } catch(e) {}
  if (navigator.vibrate) navigator.vibrate(15);
}
window.addEventListener("storage", function(e) {
  if (e.key === "ppe_theme" && e.newValue) {
    document.documentElement.setAttribute("data-theme", e.newValue);
  }
});
if (window.matchMedia) {
  var _mq = window.matchMedia("(prefers-color-scheme: light)");
  var _mqL = function(ev) {
    try { if (!localStorage.getItem("ppe_theme")) {
      document.documentElement.setAttribute("data-theme", ev.matches ? "day" : "night");
    }} catch(err) {}
  };
  if (_mq.addEventListener) _mq.addEventListener("change", _mqL);
  else if (_mq.addListener) _mq.addListener(_mqL);
}

// ═══════════════════════════════════════════════════════════════════════════
// CART — shared across index.html and shelf.html via localStorage
// Key: "ppe_cart"  Value: JSON array of { shelf, shelfLabel, itemId, itemName, size, qty, addedAt }
// ═══════════════════════════════════════════════════════════════════════════
var CART_KEY = "ppe_cart";

function cartGet() {
  try { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); }
  catch(e) { return []; }
}
function cartSet(arr) {
  localStorage.setItem(CART_KEY, JSON.stringify(arr));
  refreshCartPill();
}
function cartCount() {
  return cartGet().reduce(function(s, e){ return s + (e.qty || 0); }, 0);
}

function refreshCartPill() {
  var c = cartCount();
  var fab = document.getElementById("cartFab");
  var num = document.getElementById("cartFabCount");
  if (c > 0) {
    var wasShown = fab.classList.contains("show");
    fab.classList.add("show");
    num.textContent = c;
    // Bump animation when count changes (not on initial show)
    if (wasShown) {
      fab.classList.remove("bump");
      void fab.offsetWidth; // force reflow to restart animation
      fab.classList.add("bump");
    }
  } else {
    fab.classList.remove("show");
  }
}

// Sync across tabs/pages
window.addEventListener("storage", function(e) {
  if (e.key === CART_KEY) refreshCartPill();
});

function openCart() {
  renderCart();
  document.getElementById("cartOverlay").classList.add("open");
  document.getElementById("cartDrawer").classList.add("open");
}
function closeCart() {
  document.getElementById("cartOverlay").classList.remove("open");
  document.getElementById("cartDrawer").classList.remove("open");
}
function renderCart() {
  var cart = cartGet();
  var body = document.getElementById("cartBody");
  var foot = document.getElementById("cartFoot");
  var sub = document.getElementById("cartSub");
  var totalQty = cart.reduce(function(s, e){ return s + e.qty; }, 0);
  sub.textContent = cart.length === 0 ? "0 items" : (cart.length + " line" + (cart.length!==1?"s":"") + " · " + totalQty + " piece" + (totalQty!==1?"s":""));

  if (cart.length === 0) {
    body.innerHTML = '<div class="cart-empty">Your cart is empty.<br><br>Tap any shelf, pick an item, and press <b>Add to Cart</b>.</div>';
    foot.style.display = "none";
    return;
  }
  body.innerHTML = cart.map(function(e, idx) {
    return '<div class="cart-row">' +
      '<div class="cart-row-info">' +
        '<div class="cart-row-shelf">📍 ' + (e.shelfLabel || e.shelf) + '</div>' +
        '<div class="cart-row-name">' + e.itemName + '</div>' +
        '<div class="cart-row-size">Size ' + e.size + '</div>' +
      '</div>' +
      '<div class="cart-row-qty">×' + e.qty + '</div>' +
      '<button class="cart-row-rm" onclick="removeCartLine(' + idx + ')">Remove</button>' +
    '</div>';
  }).join("");
  foot.style.display = "flex";
}
function removeCartLine(idx) {
  var cart = cartGet();
  cart.splice(idx, 1);
  cartSet(cart);
  renderCart();
}
function clearCartConfirm() {
  if (!confirm("Clear all " + cartCount() + " items from the cart?")) return;
  cartSet([]);
  renderCart();
  toast("Cart cleared", false, true);
}

function submitCart() {
  var cart = cartGet();
  if (cart.length === 0) return;
  var name = document.getElementById("cartNameInp").value.trim() || "—";
  var btn = document.getElementById("cartSubmitBtn");
  btn.disabled = true;
  btn.textContent = "Submitting…";

  var now = new Date();
  var timeStr = now.toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit"});
  var dateStr = now.toISOString().slice(0,10);

  // Submit each line individually (keeps Apps Script unchanged)
  var promises = cart.map(function(e) {
    var payload = {
      action: "logIssue",
      shelf: e.shelf, itemId: e.itemId, itemName: e.itemName,
      size: e.size, qty: e.qty, name: name,
      time: timeStr, date: dateStr
    };
    return fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(function(r){ return r.text(); })
      .catch(function(){ return null; });
  });

  Promise.all(promises).then(function() {
    cartSet([]);
    closeCart();
    toast("✓ Submitted " + cart.length + " line" + (cart.length!==1?"s":"") + " — stock updating…");
    // Refresh shelf data after a short delay so updated stock shows
    setTimeout(function(){ SHELVES.forEach(function(s){ loadShelf(s); }); }, 1500);
    btn.disabled = false;
    btn.textContent = "✓ Submit All & Update Stock";
  });
}

function toast(msg, err, info) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (err ? " err" : info ? " info" : "");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2800);
}

// ═══════════════════════════════════════════════════════════════════════════
// ORIGINAL INDEX — shelf list
// ═══════════════════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWSqMvOGGM5XR75ciuMh_Stpi899u6awq1Nfl_ct2xagOTcVQ-eZ0nvZiX3GFNXrzJzA/exec";
const SHELF_PAGE      = "shelf.html";

const SHELVES = [
  { id: "305-L1-CABINET-AFT",  label: "L1 CABINET AFT", loc: "Main Deck — Port Side Cabinet" },
  { id: "305-L2-CABINET-C",    label: "L2 CABINET C",   loc: "Main Deck — Centre Cabinet" },
  { id: "305-L3-DRAWERS",      label: "L3 DRAWERS",     loc: "Main Deck — Drawer Unit" },
  { id: "305-PPE-S-01-1-S-F",  label: "S 01-1",         loc: "Main Deck — Shelf 01-1 Safety Footwear" },
  { id: "305-PPE-S-01-3-A",    label: "S 01-3",         loc: "Main Deck — Shelf 01-3 Rain / Workwear" },
  { id: "305-PPE-S-02-1-S-F",  label: "S 02-1",         loc: "Main Deck — Shelf 02-1 Coveralls" },
  { id: "305-PPE-S-02-2-P",    label: "S 02-2",         loc: "Main Deck — Shelf 02-2 Wellingtons" },
  { id: "305-PPE-S-02-3-A",    label: "S 02-3",         loc: "Main Deck — Shelf 02-3 Masks & Misc" },
  { id: "305-PPE-S-02-4-C",    label: "S 02-4",         loc: "Main Deck — Shelf 02-4 Chemical Gloves" },
  { id: "305-PPE-S-03-1-S-F",  label: "S 03-1",         loc: "Main Deck — Shelf 03-1 Coveralls" },
  { id: "305-PPE-S-03-3-A",    label: "S 03-3",         loc: "Main Deck — Shelf 03-3 Head & Hearing" },
];

const shelfCache = {};
let loadedCount  = 0;

function init() {
  const now = new Date();
  document.getElementById("dateVal").textContent =
    now.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short", year:"numeric" });

  refreshCartPill();
  renderCards();
  loadedCount = 0;
  SHELVES.forEach(s => loadShelf(s));
}

function loadShelf(shelf) {
  const cbName = 'cb_' + shelf.id.replace(/-/g, '_') + '_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(data) {
    script.remove();
    delete window[cbName];
    shelfCache[shelf.id] = data;
    loadedCount++;
    updateCard(shelf.id, data);
    if (loadedCount === SHELVES.length) updateSummary();
  };

  script.src = APPS_SCRIPT_URL +
    '?action=getShelf&id=' + encodeURIComponent(shelf.id) +
    '&callback=' + cbName;
  document.head.appendChild(script);
}

function totalStock(item) { return Object.values(item.sizes || {}).reduce((a, b) => a + b, 0); }
function itemStatus(item) {
  const t = totalStock(item);
  if (t === 0)         return "out";
  if (t <= item.min)   return "crit";
  if (t <= item.min*2) return "warn";
  return "ok";
}

function renderCards() {
  document.getElementById("gridWrap").innerHTML =
    `<div class="shelf-grid">${SHELVES.map((s, i) => `
      <a class="shelf-card" href="${SHELF_PAGE}?id=${s.id}"
         id="card-${s.id}" style="animation-delay:${(i+1)*0.04}s">
        <div class="card-top">
          <div>
            <div class="card-id">${s.id}</div>
            <div class="card-name">${s.label}</div>
          </div>
          <span class="status-pill pill-load">Loading…</span>
        </div>
        <div class="card-bottom">
          <div class="card-loc">${s.loc}</div>
          <div class="item-pills" id="pills-${s.id}"></div>
          <div class="card-arrow">VIEW SHELF →</div>
        </div>
      </a>`).join("")}</div>`;
}

function updateCard(shelfId, data) {
  const card = document.getElementById('card-' + shelfId);
  if (!card) return;
  const items = data.items || [];
  const hasCrit = items.some(i => itemStatus(i) === "crit" || itemStatus(i) === "out");
  const hasWarn = items.some(i => itemStatus(i) === "warn");
  card.classList.remove("has-crit", "has-warn");
  if (hasCrit) card.classList.add("has-crit");
  else if (hasWarn) card.classList.add("has-warn");

  const pill = card.querySelector('.status-pill');
  if (items.length === 0) {
    pill.className = "status-pill pill-load";
    pill.textContent = "Empty";
  } else if (hasCrit) {
    pill.className = "status-pill pill-crit";
    pill.textContent = "LOW STOCK";
  } else if (hasWarn) {
    pill.className = "status-pill pill-warn";
    pill.textContent = "Running low";
  } else {
    pill.className = "status-pill pill-ok";
    pill.textContent = `${items.length} items`;
  }

  const pillsEl = document.getElementById('pills-' + shelfId);
  if (pillsEl) {
    pillsEl.innerHTML = items.slice(0, 5).map(item => {
      const st = itemStatus(item);
      const cls = st === "crit" || st === "out" ? "low" : st === "warn" ? "warn" : "";
      return `<span class="item-pill ${cls}">${item.name}</span>`;
    }).join("") + (items.length > 5 ? `<span class="item-pill">+${items.length - 5} more</span>` : "");
  }
}

function updateSummary() {
  let totalItems = 0, critShelves = 0, warnShelves = 0, okShelves = 0;
  SHELVES.forEach(s => {
    const data = shelfCache[s.id];
    if (!data || !data.items) return;
    totalItems += data.items.length;
    const hasCrit = data.items.some(i => itemStatus(i) === "crit" || itemStatus(i) === "out");
    const hasWarn = data.items.some(i => itemStatus(i) === "warn");
    if (hasCrit) critShelves++;
    else if (hasWarn) warnShelves++;
    else okShelves++;
  });
  document.getElementById("summaryBar").innerHTML = `
    <div class="sstat"><div class="dot dot-ok"></div> ${SHELVES.length} shelves</div>
    <div class="sstat"><div class="dot dot-ok"></div> ${totalItems} item types total</div>
    ${critShelves ? `<div class="sstat"><div class="dot dot-crit"></div> ${critShelves} shelves low stock</div>` : ""}
    ${warnShelves ? `<div class="sstat"><div class="dot dot-warn"></div> ${warnShelves} shelves running low</div>` : ""}
    <div class="sstat"><div class="dot dot-ok"></div> ${okShelves} shelves OK</div>
  `;
  document.getElementById("lastUpdated").textContent =
    "Last refreshed: " + new Date().toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"});
}

// ── ADMIN PIN ──────────────────────────────────────────────────────────────
const ADMIN_PIN = 'LAVR7';
let adminUnlocked = false;

function promptAdminPin() {
  if (adminUnlocked) { lockAdmin(); return; }
  document.getElementById('pinOverlay').style.display = 'flex';
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  setTimeout(function(){ document.getElementById('pinInput').focus(); }, 100);
}
function checkPin() {
  var entered = document.getElementById('pinInput').value.trim();
  if (entered === ADMIN_PIN) {
    adminUnlocked = true;
    closePinModal();
    var btn = document.getElementById('adminFooterBtn');
    btn.textContent = '🔓 ADMIN ON';
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}
function lockAdmin() {
  adminUnlocked = false;
  var btn = document.getElementById('adminFooterBtn');
  btn.textContent = '🔒 ADMIN';
  btn.style.color = '';
  btn.style.borderColor = '';
}
function closePinModal() {
  document.getElementById('pinOverlay').style.display = 'none';
}

init();
</script>
